services:
  postgres-db:
    image: postgres:15
    container_name: msconnect-postgres
    environment:
      POSTGRES_DB: msconnect
      POSTGRES_USER: ms_admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: